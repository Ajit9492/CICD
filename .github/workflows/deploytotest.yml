name: Deploy to TEST instance

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  deploy_to_test:
    name: Apply Changes to TEST
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Apply Changes to TEST
      uses: ServiceNow/sncicd-apply-changes@1.2.1
      env:
        snowUsername: ${{ secrets.SN_TEST_USERNAME }}      # ✅ Changed from nowUsername to snowUsername
        snowPassword: ${{ secrets.SN_TEST_PASSWORD }}      # ✅ Changed from nowPassword to snowPassword
        snowSourceInstance: ${{ secrets.NOW_TEST_INSTANCE }}  # ✅ Changed from nowSourceInstance to snowSourceInstance
        appSysID: ${{ secrets.APP_SYS_ID }}

    - name: Create Git Tag
      if: ${{ success() }}
      run: |
        VERSION="test-deploy-$(date +'%Y%m%d-%H%M%S')"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "$VERSION"
        git push origin "$VERSION"
